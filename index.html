<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ojo al Click | Domina la Red</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --fondo: #050a14; 
            --cian: #00ffff; 
            --fucsia: #ff00ff; 
            --amarillo: #fbff00; 
            --blanco: #ffffff; 
        }

        body { 
            background-color: var(--fondo); 
            color: var(--blanco); 
            font-family: 'Open Sans', sans-serif; 
            margin: 0; 
            text-align: center;
        }

        /* --- MENÚ DE NAVEGACIÓN --- */
        nav {
            padding: 20px;
            background: rgba(0,0,0,0.5);
            border-bottom: 2px solid var(--cian);
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .nav-btn {
            color: var(--blanco);
            text-decoration: none;
            font-family: 'Montserrat';
            font-weight: 900;
            text-transform: uppercase;
            padding: 10px 20px;
            border: 1px solid transparent;
            transition: 0.3s;
        }

        .nav-btn:hover {
            color: var(--cian);
            border-bottom: 1px solid var(--cian);
        }

        /* --- EL BOTÓN ESPECIAL DEL RECREATIVO --- */
        .nav-game-btn {
            color: var(--amarillo);
            text-decoration: none;
            font-family: 'Montserrat';
            font-weight: 900;
            text-transform: uppercase;
            padding: 10px 20px;
            border: 2px solid var(--amarillo);
            border-radius: 5px;
            animation: glow 1.5s infinite alternate;
            transition: 0.3s;
        }

        @keyframes glow {
            from { box-shadow: 0 0 5px var(--amarillo); }
            to { box-shadow: 0 0 20px var(--amarillo), 0 0 10px var(--fucsia); }
        }

        .nav-game-btn:hover {
            background: var(--amarillo);
            color: #000;
            transform: scale(1.1) rotate(-3deg);
        }

        /* --- SECCIÓN HERO --- */
        .hero {
            padding: 100px 20px;
            background: linear-gradient(rgba(5,10,20,0.8), rgba(5,10,20,0.8)), url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&q=80');
            background-size: cover;
            border-bottom: 5px solid var(--fucsia);
        }

        h1 { 
            font-family: 'Montserrat'; 
            font-size: clamp(2.5rem, 8vw, 5rem); 
            color: var(--cian); 
            text-shadow: 5px 5px var(--fucsia); 
            margin: 0;
        }

        .tagline {
            font-size: 1.5rem;
            color: var(--amarillo);
            font-weight: bold;
            margin-top: 10px;
        }

        /* --- BOTÓN DE AUDIO (HIMNO) --- */
        #audio-controls { margin-top: 30px; }
        .audio-btn {
            background: var(--fucsia);
            border: none;
            color: white;
            padding: 15px 30px;
            font-family: 'Montserrat';
            font-weight: 900;
            cursor: pointer;
            border-radius: 50px;
            box-shadow: 0 5px 0 #b00040;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-btn">INICIO</a>
        <a href="#articulos" class="nav-btn">ARTÍCULOS</a>
        <a href="recreativo.html" class="nav-game-btn">🕹️ EL RECREATIVO</a>
    </nav>

    <header class="hero">
        <h1>OJO AL CLICK</h1>
        <p class="tagline">¡Domina la red antes de que ella te domine a ti! 👁️🖱️</p>
        
        <div id="audio-controls">
            <button class="audio-btn" onclick="toggleAudio()">🎵 REPRODUCIR HIMNO</button>
            <audio id="background-audio" src="himno.mp3" loop></audio>
        </div>
    </header>

    <main class="container" id="articulos" style="padding: 50px 20px;">
        <h2 style="font-family: 'Montserrat'; color: var(--fucsia); font-size: 2rem;">📰 ÚLTIMAS INVESTIGACIONES</h2>
        
        <div style="margin-top: 40px;">
            <a href="articulos/el-iceberg.html" style="text-decoration: none; color: inherit;">
                <div style="background: rgba(0,255,255,0.1); border: 2px solid var(--cian); padding: 30px; border-radius: 15px; transition: 0.3s; max-width: 600px; margin: 0 auto;">
                    <h3 style="color: var(--cian); margin-top: 0;">🌐 EL ICEBERG DIGITAL</h3>
                    <p>¿Sabías que Internet tiene cables bajo el mar y que los tiburones los muerden? Descubre la historia de la "Rata Pisada".</p>
                    <span style="color: var(--amarillo); font-weight: bold;">LEER MÁS →</span>
                </div>
            </a>
        </div>
    </main>

    <script>
        function toggleAudio() {
            const audio = document.getElementById('background-audio');
            const btn = document.querySelector('.audio-btn');
            if (audio.paused) {
                audio.play();
                btn.innerText = "⏸️ PAUSAR HIMNO";
                btn.style.background = var(--cian);
            } else {
                audio.pause();
                btn.innerText = "🎵 REPRODUCIR HIMNO";
                btn.style.background = var(--fucsia);
            }
        }
    </script>
</body>
</html>
